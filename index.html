<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GestiClaro — Sistema de Gestión</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    /* Color principal del sistema: azul/violeta (antes rojo Claro) */
    --rojo: #4F46E5;
    --rojo-oscuro: #4338CA;
    --rojo-suave: #EEF2FF;
    /* Acento ocasional: rojo, reservado para alertas/criticidad */
    --acento: #DC2626;
    --acento-oscuro: #B91C1C;
    --acento-suave: #FEF2F2;
    --gris-900: #1E293B;
    --gris-800: #334155;
    --gris-700: #475569;
    --gris-500: #64748B;
    --gris-300: #CBD5E1;
    --gris-100: #F1F5F9;
    --blanco: #FFFFFF;
    --verde: #16A34A;
    --verde-suave: #F0FDF4;
    --amarillo: #CA8A04;
    --amarillo-suave: #FEFCE8;
    --azul: #2563EB;
    --azul-suave: #EFF6FF;
    --naranja: #7C3AED;
    --naranja-suave: #F5F3FF;
    --sombra: 0 2px 8px rgba(30,41,59,0.07);
    --sombra-md: 0 4px 16px rgba(30,41,59,0.12);
    --radio: 10px;
    --radio-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--gris-100);
    color: var(--gris-900);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--gris-900) 0%, var(--gris-800) 60%, #3a0000 100%);
  }

  .login-card {
    background: var(--blanco);
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .login-logo {
    text-align: center;
    margin-bottom: 28px;
  }

  .login-logo .marca {
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }

  .logo-circulo {
    width: 44px;
    height: 44px;
    background: var(--rojo);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: -1px;
  }

  .login-logo h1 {
    font-size: 22px;
    font-weight: 800;
    color: var(--gris-900);
    letter-spacing: -0.5px;
  }

  .login-logo p {
    font-size: 11px;
    color: var(--gris-500);
    margin-top: 4px;
    text-align: center;
  }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--gris-700);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--gris-300);
    border-radius: var(--radio-sm);
    font-size: 14px;
    color: var(--gris-900);
    background: var(--blanco);
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }

  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--rojo);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: var(--radio-sm);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    font-family: inherit;
    text-decoration: none;
  }

  .btn-primary {
    background: var(--rojo);
    color: white;
  }
  .btn-primary:hover { background: var(--rojo-oscuro); }

  .btn-secondary {
    background: var(--gris-100);
    color: var(--gris-700);
    border: 1.5px solid var(--gris-300);
  }
  .btn-secondary:hover { background: var(--gris-300); }

  .btn-success { background: var(--verde); color: white; }
  .btn-success:hover { background: #15803d; }

  .btn-outline {
    background: transparent;
    color: var(--rojo);
    border: 1.5px solid var(--rojo);
  }
  .btn-outline:hover { background: var(--rojo-suave); }

  .btn-full { width: 100%; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-icon { padding: 7px; }

  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg {
    background: var(--rojo-suave);
    color: var(--rojo);
    border: 1px solid #fca5a5;
    border-radius: var(--radio-sm);
    padding: 10px 12px;
    font-size: 13px;
    margin-bottom: 14px;
  }

  /* ── LAYOUT PRINCIPAL ── */
  #app { display: none; height: 100vh; overflow: hidden; }

  .app-layout {
    display: flex;
    height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 240px;
    background: var(--gris-900);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .sidebar-brand {
    padding: 20px 16px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-brand .logo-circulo {
    width: 36px;
    height: 36px;
    font-size: 15px;
    flex-shrink: 0;
  }

  .sidebar-brand-text h2 {
    color: white;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }

  .sidebar-brand-text p {
    color: rgba(255,255,255,0.4);
    font-size: 10px;
    margin-top: 1px;
  }

  .sidebar-user {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .user-avatar {
    width: 30px;
    height: 30px;
    background: var(--rojo);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .user-info p { color: rgba(255,255,255,0.85); font-size: 12px; font-weight: 600; }
  .user-info span { color: rgba(255,255,255,0.35); font-size: 10px; }

  .sidebar-nav { flex: 1; padding: 10px 8px; }

  .nav-section { margin-bottom: 2px; }

  .nav-section-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 10px 10px 10px 8px;
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.4);
    font-size: 10.5px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: inherit;
    border-radius: 8px;
    transition: background 0.12s, color 0.12s;
  }

  .nav-section-toggle:hover {
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.7);
  }

  .nav-section-toggle .chevron {
    transition: transform 0.18s ease;
    flex-shrink: 0;
  }

  .nav-section-toggle.collapsed .chevron {
    transform: rotate(-90deg);
  }

  .nav-section-body {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    max-height: 600px;
    transition: max-height 0.22s ease;
  }

  .nav-section-body.collapsed {
    max-height: 0;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    color: rgba(255,255,255,0.55);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.12s;
    margin-bottom: 1px;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
  }

  .nav-item:hover {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.85);
  }

  .nav-item.active {
    background: var(--rojo);
    color: white;
  }

  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

  .sidebar-footer {
    padding: 12px 8px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  /* ── CONTENIDO PRINCIPAL ── */
  .main-content {
    flex: 1;
    overflow-y: auto;
    background: var(--gris-100);
  }

  .page-header {
    background: var(--blanco);
    border-bottom: 1px solid #e5e7eb;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .page-header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--gris-900);
  }

  .page-header p {
    font-size: 12px;
    color: var(--gris-500);
    margin-top: 2px;
  }

  .page-body { padding: 24px; }

  /* ── CARDS ── */
  .card {
    background: var(--blanco);
    border-radius: var(--radio);
    border: 1px solid #e5e7eb;
    box-shadow: var(--sombra);
  }

  .card-header {
    padding: 16px 20px;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-header h3 { font-size: 14px; font-weight: 700; }
  .card-body { padding: 20px; }

  /* ── ESTADÍSTICAS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--blanco);
    border-radius: var(--radio);
    padding: 18px 20px;
    border: 1px solid #e5e7eb;
    box-shadow: var(--sombra);
  }

  .stat-card .label {
    font-size: 11px;
    font-weight: 600;
    color: var(--gris-500);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .stat-card .valor {
    font-size: 26px;
    font-weight: 800;
    color: var(--gris-900);
    letter-spacing: -1px;
  }

  .stat-card .sub {
    font-size: 11px;
    color: var(--gris-500);
    margin-top: 4px;
  }

  .stat-card.rojo .valor { color: var(--rojo); }
  .stat-card.verde .valor { color: var(--verde); }
  .stat-card.azul .valor { color: var(--azul); }
  .stat-card.naranja .valor { color: var(--naranja); }

  /* ── TABLAS ── */
  .tabla-wrapper {
    overflow-x: auto;
    border-radius: var(--radio);
    border: 1px solid #e5e7eb;
    background: white;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead tr {
    background: var(--gris-100);
    border-bottom: 1px solid #e5e7eb;
  }

  th {
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: var(--gris-500);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    white-space: nowrap;
  }

  td {
    padding: 10px 14px;
    border-bottom: 1px solid #f5f5f5;
    color: var(--gris-800);
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--gris-100); }

  /* ── BADGES ── */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }

  .badge-verde { background: var(--verde-suave); color: var(--verde); }
  .badge-rojo { background: var(--rojo-suave); color: var(--rojo); }
  .badge-amarillo { background: var(--amarillo-suave); color: var(--amarillo); }
  .badge-azul { background: var(--azul-suave); color: var(--azul); }
  .badge-naranja { background: var(--naranja-suave); color: var(--naranja); }
  .badge-gris { background: var(--gris-100); color: var(--gris-500); border: 1px solid var(--gris-300); }

  /* ── BÚSQUEDA ── */
  .search-bar {
    position: relative;
    max-width: 360px;
  }

  .search-bar input {
    padding-left: 34px;
  }

  .search-bar svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gris-500);
    width: 15px;
    height: 15px;
    pointer-events: none;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal {
    background: var(--blanco);
    border-radius: 14px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--sombra-md);
  }

  .modal-header {
    padding: 18px 20px;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-header h3 { font-size: 15px; font-weight: 700; }
  .modal-body { padding: 20px; }
  .modal-footer {
    padding: 16px 20px;
    border-top: 1px solid #f0f0f0;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  /* ── GRID FORM ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid .full { grid-column: 1 / -1; }

  /* ── TOAST ── */
  #toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    background: var(--gris-900);
    color: white;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: var(--sombra-md);
    display: flex;
    align-items: center;
    gap: 8px;
    animation: slideIn 0.2s ease;
    max-width: 320px;
  }

  .toast.success { background: var(--verde); }
  .toast.error { background: var(--rojo); }
  .toast.warning { background: var(--amarillo); }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  @keyframes slideIn {
    from { transform: translateX(40px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--gris-500);
  }

  .empty-state svg { width: 48px; height: 48px; color: var(--gris-300); margin: 0 auto 12px; display: block; }
  .empty-state p { font-size: 14px; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 2px;
    background: var(--gris-100);
    border-radius: 8px;
    padding: 3px;
    margin-bottom: 20px;
    width: fit-content;
  }

  .tab-btn {
    padding: 7px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--gris-500);
    font-family: inherit;
    transition: all 0.12s;
  }

  .tab-btn.active {
    background: var(--blanco);
    color: var(--gris-900);
    font-weight: 600;
    box-shadow: var(--sombra);
  }

  /* ── DASHBOARD GRID ── */
  .dashboard-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  /* ── SEPARADOR ── */
  .divider { height: 1px; background: #f0f0f0; margin: 16px 0; }

  /* ── TOGGLE SIDEBAR MOBILE ── */
  .mobile-menu-btn {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
  }

  @media (max-width: 768px) {
    .sidebar { position: fixed; left: -240px; top: 0; height: 100%; z-index: 50; transition: left 0.25s; }
    .sidebar.open { left: 0; }
    .mobile-menu-btn { display: block; }
    .form-grid { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .dashboard-grid { grid-template-columns: 1fr; }
    .page-body { padding: 16px; }
  }
</style>
</head>
<body>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- ══════════════════════════════════════════
     PANTALLA DE LOGIN
══════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="marca">
        <div class="logo-circulo">GC</div>
        <div>
          <h1>GestiClaro</h1>
        </div>
      </div>
      <p>Sistema de Gestión — Agente Oficial Claro</p>
    </div>

    <div id="login-error" class="error-msg" style="display:none"></div>

    <div class="form-group">
      <label>Usuario</label>
      <input type="email" id="login-email" placeholder="tu@email.com" value="admin@gesticlaro.com" />
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" value="admin123" />
    </div>
    <button class="btn btn-primary btn-full" onclick="iniciarSesion()">Ingresar al sistema</button>

    <p style="text-align:center; font-size:11px; color:var(--gris-500); margin-top:16px;">
      Demo: admin@gesticlaro.com / admin123
    </p>
  </div>
</div>

<!-- ══════════════════════════════════════════
     APP PRINCIPAL
══════════════════════════════════════════ -->
<div id="app">
  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="logo-circulo">GC</div>
        <div class="sidebar-brand-text">
          <h2>GestiClaro</h2>
          <p>Agente Oficial Claro</p>
        </div>
      </div>

      <div class="sidebar-user">
        <div class="user-avatar" id="user-avatar">A</div>
        <div class="user-info">
          <p id="user-name">Administrador</p>
          <span id="user-role">Administrador</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" onclick="navegar('dashboard')">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </button>

        <div class="nav-section">
          <button class="nav-section-toggle collapsed" onclick="toggleNavSection(this)">
            <span>Logística</span>
            <svg class="chevron" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="nav-section-body collapsed">
            <button class="nav-item" onclick="navegar('stock')">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 3H8l-2 4h12l-2-4z"/></svg>
              Stock
            </button>
            <button class="nav-item" onclick="navegar('remitos')">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              Remitos
            </button>
            <button class="nav-item" onclick="navegar('materiales')">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
              Materiales
            </button>
          </div>
        </div>

        <div class="nav-section">
          <button class="nav-section-toggle collapsed" onclick="toggleNavSection(this)">
            <span>Administración</span>
            <svg class="chevron" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>

<script>
// ══════════════════════════════════════════
// BASE DE DATOS LOCAL (localStorage)
// ══════════════════════════════════════════

// ══════════════════════════════════════════
// SUPABASE — Configuración
// ══════════════════════════════════════════
const SUPABASE_URL = 'https://iebfyjbkmjuicrrbezbi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_zi7bb1bTdazL5dwGu7-t8w_xp-MoPnl';

// Cliente liviano sin SDK — usa la REST API directamente
const SB = {
  headers(token) {
    const h = {
      'apikey': SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
    };
    if (token) h['Authorization'] = `Bearer ${token}`;
    return h;
  },

  async getAll(tabla, token) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?select=*`, {
      headers: this.headers(token),
    });
    if (!r.ok) { console.error('SB.getAll error', tabla, await r.text()); return []; }
    return r.json();
  },

  async insert(tabla, data, token) {
    const body = Array.isArray(data) ? data : [data];
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}`, {
      method: 'POST',
      headers: this.headers(token),
      body: JSON.stringify(body),
    });
    if (!r.ok) { console.error('SB.insert error', tabla, await r.text()); return null; }
    const res = await r.json();
    return Array.isArray(data) ? res : res[0];
  },

  async update(tabla, id, data, token) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?id=eq.${id}`, {
      method: 'PATCH',
      headers: this.headers(token),
      body: JSON.stringify(data),
    });
    if (!r.ok) { console.error('SB.update error', tabla, await r.text()); return null; }
    const res = await r.json();
    return res[0];
  },

  async delete(tabla, id, token) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?id=eq.${id}`, {
      method: 'DELETE',
      headers: { ...this.headers(token), 'Prefer': '' },
    });
    return r.ok;
  },

  async upsertAll(tabla, rows, token) {
    // Borra todo y reinsertar (para tablas SAP que se reemplazan completas)
    await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?id=neq.00000000-0000-0000-0000-000000000000`, {
      method: 'DELETE',
      headers: { ...this.headers(token), 'Prefer': '' },
    });
    if (!rows.length) return;
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}`, {
      method: 'POST',
      headers: { ...this.headers(token), 'Prefer': 'return=minimal' },
      body: JSON.stringify(rows),
    });
    if (!r.ok) console.error('SB.upsertAll error', tabla, await r.text());
  },

  async login(email, password) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    if (!r.ok) return null;
    return r.json(); // { access_token, user, ... }
  },

  async logout(token) {
    await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` },
    });
  },
};

// Cache local en memoria para no recargar Supabase en cada operación
// (se refresca al navegar entre módulos o al hacer cambios)
const CACHE = {};

// Mapeo de claves del sistema a nombres de tablas en Supabase
const TABLA_MAP = {
  'dispositivos':          'dispositivos',
  'remitos':               'remitos',
  'puntos_venta':          'puntos_venta',
  'usuarios':              'usuarios',
  'cuentas_corrientes':    'cuentas_corrientes',
  'legajos':               'legajos',
  'materiales':            'materiales',
  'stock_sap_conciliado':  'stock_sap_conciliado',
  'equipos_sap_transito':  'equipos_sap_transito',
  'inventario_sap':        'stock_sap_conciliado', // alias
};

async function dbGet(tabla) {
  const t = TABLA_MAP[tabla] || tabla;
  if (CACHE[tabla]) return CACHE[tabla];
  const data = await SB.getAll(t, SB_TOKEN);
  CACHE[tabla] = data;
  return data;
}

function dbInvalidate(tabla) {
  delete CACHE[tabla];
}

// Escribe todos los registros de una tabla en Supabase (reemplaza todo)
async function dbSync(key, rows) {
  const tabla = TABLA_MAP[key];
  if (!tabla || !SB_TOKEN) return;
  try {
    // Borrar todos los registros actuales
    await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?id=neq.00000000-0000-0000-0000-000000000000`, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SB_TOKEN}`, 'Prefer': '' },
    });
    // Reinsertar si hay datos
    if (rows && rows.length) {
      await fetch(`${SUPABASE_URL}/rest/v1/${tabla}`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SB_TOKEN}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify(rows),
      });
    }
  } catch(e) {
    console.error('dbSync error', key, e);
  }
}

const DB = {
  get(key) {
    return CACHE[key] || [];
  },
  set(key, val) {
    CACHE[key] = val;
    // Sincronizar con Supabase en background si la tabla existe en el mapa
    if (TABLA_MAP[key] && SB_TOKEN) {
      dbSync(key, val).catch(e => console.error('sync error', key, e));
    }
  },
  genId() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
  },
};

// Carga todas las tablas desde Supabase al cache al iniciar sesión
async function cargarDatosIniciales() {
  const tablas = Object.keys(TABLA_MAP).filter(k => TABLA_MAP[k] !== 'stock_sap_conciliado' || k === 'stock_sap_conciliado');
  const unicas = [...new Set(Object.keys(TABLA_MAP))];
  await Promise.all(unicas.map(t => dbGet(t).catch(() => [])));
}


// Token de sesión activo (se setea al hacer login)
let SB_TOKEN = null;
let usuarioActual = null;

// ══════════════════════════════════════════
// AUTH — Supabase Auth
// ══════════════════════════════════════════

async function iniciarSesion() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  const btn = document.querySelector('#login-screen .btn-primary');

  err.style.display = 'none';
  if (btn) { btn.textContent = 'Ingresando...'; btn.disabled = true; }

  try {
    const session = await SB.login(email, pass);
    if (!session || !session.access_token) {
      err.textContent = 'Usuario o contraseña incorrectos.';
      err.style.display = 'block';
      if (btn) { btn.textContent = 'Ingresar al sistema'; btn.disabled = false; }
      return;
    }

    SB_TOKEN = session.access_token;
    const user = session.user;

    usuarioActual = {
      id: user.id,
      nombre: user.user_metadata?.nombre || email.split('@')[0],
      correo: email,
      rol: user.user_metadata?.rol || 'Operador',
    };

    mostrarCargando('Cargando datos desde Supabase...');
    await cargarDatosIniciales();

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-name').textContent = usuarioActual.nombre;
    document.getElementById('user-role').textContent = usuarioActual.rol;
    document.getElementById('user-avatar').textContent = usuarioActual.nombre[0].toUpperCase();
    document.getElementById('header-fecha').textContent = new Date().toLocaleDateString('es-AR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    iniciarRealtime();
    navegar('dashboard');

  } catch(e) {
    err.textContent = 'Error de conexión: ' + e.message;
    err.style.display = 'block';
    if (btn) { btn.textContent = 'Ingresar al sistema'; btn.disabled = false; }
  }
}

function mostrarCargando(msg) {
  const el = document.getElementById('login-error');
  if (el) { el.textContent = msg; el.style.display = 'block'; el.style.color = 'var(--azul)'; el.style.background = 'var(--azul-suave)'; el.style.border = '1px solid var(--azul)'; }
}

async function cerrarSesion() {
  detenerRealtime();
  if (SB_TOKEN) await SB.logout(SB_TOKEN);
  SB_TOKEN = null;
  usuarioActual = null;
  Object.keys(CACHE).forEach(k => delete CACHE[k]);
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  const el = document.getElementById('login-error');
  if (el) { el.style.color = ''; el.style.background = ''; el.style.border = ''; el.style.display = 'none'; }
}

document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') iniciarSesion(); });

// ══════════════════════════════════════════
// NAVEGACIÓN
// ══════════════════════════════════════════

const PAGINAS = {
  dashboard:     { titulo: 'Dashboard',              sub: 'Resumen general del sistema' },
  stock:         { titulo: 'Stock',                  sub: 'Equipos y SIMs disponibles' },
  remitos:       { titulo: 'Remitos',                sub: 'Ingresos, transferencias e historial' },
  materiales:    { titulo: 'Materiales',              sub: 'Catálogo de modelos y precios' },
  cuentas:       { titulo: 'Cuentas Corrientes',     sub: 'Movimientos por punto de venta' },
  legajos:       { titulo: 'Legajos / SDS',          sub: 'Ventas registradas' },
  importar:      { titulo: 'Importar SDS / Webcom',  sub: 'Carga masiva de ventas' },
  'puntos-venta':{ titulo: 'Puntos de Venta',        sub: 'Gestión de sucursales' },
  usuarios:      { titulo: 'Usuarios',               sub: 'Control de acceso' },
  comodatos:     { titulo: 'Comodatos — Vencimientos', sub: 'Control de días en consignación Claro AMX' },
  conciliacion:  { titulo: 'Conciliación SAP',       sub: 'Comparar stock propio vs inventario Claro' },
  sistemas:      { titulo: 'Configuración Sistemas AMX', sub: 'Credenciales y parámetros de conexión con Claro' },
};

function navegar(pagina) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  let itemActivo = null;
  document.querySelectorAll('.nav-item').forEach(el => {
    if (el.getAttribute('onclick') === `navegar('${pagina}')`) { el.classList.add('active'); itemActivo = el; }
  });

  // Si el item activo está dentro de una sección colapsada, la expandimos
  if (itemActivo) {
    const seccion = itemActivo.closest('.nav-section');
    if (seccion) {
      seccion.querySelector('.nav-section-body')?.classList.remove('collapsed');
      seccion.querySelector('.nav-section-toggle')?.classList.remove('collapsed');
    }
  }

  const info = PAGINAS[pagina] || { titulo: pagina, sub: '' };
  document.getElementById('page-title').textContent = info.titulo;
  document.getElementById('page-subtitle').textContent = info.sub;

  const content = document.getElementById('page-content');
  switch (pagina) {
    case 'dashboard':      content.innerHTML = renderDashboard(); break;
    case 'stock':          content.innerHTML = renderStock(); break;
    case 'remitos':        remitosVista = 'menu'; content.innerHTML = renderRemitos(); break;
    case 'materiales':     content.innerHTML = renderMateriales(); break;
    case 'cuentas':        content.innerHTML = renderCuentas(); break;
    case 'legajos':        content.innerHTML = renderLegajos(); break;
    case 'puntos-venta':   content.innerHTML = renderPuntosVenta(); break;
    case 'usuarios':       content.innerHTML = renderUsuarios(); break;
    case 'importar':       content.innerHTML = renderImportar(); break;
    case 'comodatos':      content.innerHTML = renderComodatos(); break;
    case 'conciliacion':   content.innerHTML = renderConciliacion(); break;
    case 'sistemas':       content.innerHTML = renderSistemas(); break;
    default:               content.innerHTML = `<div class="empty-state"><p>Módulo en construcción</p></div>`;
  }

  // Cerrar sidebar en mobile
  document.getElementById('sidebar').classList.remove('open');
}

function toggleNavSection(btn) {
  const seccion = btn.closest('.nav-section');
  const body = seccion.querySelector('.nav-section-body');
  btn.classList.toggle('collapsed');
  body.classList.toggle('collapsed');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════

function toast(msg, tipo = 'success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${tipo}`;
  t.innerHTML = `<span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ══════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════

function renderDashboard() {
  const dispositivos = DB.get('dispositivos');
  const disponibles = dispositivos.filter(d => d.estado === 'disponible').length;
  const vendidos = dispositivos.filter(d => d.estado === 'vendido').length;
  const remitos = DB.get('remitos');
  const cuentas = DB.get('cuentas_corrientes');
  const totalHaber = cuentas.filter(c => c.tipo === 'haber').reduce((a, c) => a + c.importe, 0);
  const pvs = DB.get('puntos_venta').filter(p => !p.es_deposito);

  return `
    <div class="stats-grid">
      <div class="stat-card verde">
        <div class="label">Equipos Disponibles</div>
        <div class="valor">${disponibles}</div>
        <div class="sub">En todos los puntos de venta</div>
      </div>
      <div class="stat-card rojo">
        <div class="label">Equipos Vendidos</div>
        <div class="valor">${vendidos}</div>
        <div class="sub">Total histórico</div>
      </div>
      <div class="stat-card azul">
        <div class="label">Remitos Registrados</div>
        <div class="valor">${remitos.length}</div>
        <div class="sub">Ingresos procesados</div>
      </div>
      <div class="stat-card naranja">
        <div class="label">Total Facturado</div>
        <div class="valor">$${(totalHaber/1000).toFixed(0)}K</div>
        <div class="sub">Suma de haberes</div>
      </div>
    </div>

    <div class="dashboard-grid">
      <div class="card">
        <div class="card-header">
          <h3>Stock por Punto de Venta</h3>
          <button class="btn btn-sm btn-secondary" onclick="navegar('stock')">Ver todo</button>
        </div>
        <div class="card-body" style="padding:0">
          <table>
            <thead><tr><th>Punto de Venta</th><th>Disponibles</th><th>Vendidos</th><th>Reservados</th></tr></thead>
            <tbody>
              ${pvs.map(pv => {
                const disps = dispositivos.filter(d => d.punto_venta_id === pv.id);
                const disp = disps.filter(d => d.estado === 'disponible').length;
                const vend = disps.filter(d => d.estado === 'vendido').length;
                const res = disps.filter(d => d.estado === 'reservado').length;
                return `<tr>
                  <td><strong>${pv.nombre}</strong></td>
                  <td><span class="badge badge-verde">${disp}</span></td>
                  <td><span class="badge badge-gris">${vend}</span></td>
                  <td><span class="badge badge-amarillo">${res}</span></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>Últimos Remitos</h3>
          <button class="btn btn-sm btn-secondary" onclick="navegar('remitos')">Ver todo</button>
        </div>
        <div class="card-body" style="padding:0">
          <table>
            <thead><tr><th>Remito</th><th>PV</th><th>Items</th><th>Fecha</th></tr></thead>
            <tbody>
              ${remitos.slice(-5).reverse().map(r => `
                <tr>
                  <td><span style="font-family:monospace;font-weight:600">${r.nro_remito}</span></td>
                  <td>${r.punto_venta_nombre}</td>
                  <td><span class="badge badge-azul">${r.cantidad_items}</span></td>
                  <td>${r.fecha}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function renderStock() {

      ${pedidos.map(pedido => {

        <div class="card">
          <div class="card-header" style="flex-wrap:wrap;gap:8px">

              <h3 style="font-family:monospace">📦 Pedido: ${pedido}</h3>

async function confirmarRemitoDesdeTransito(nroPedido) {
  const nroRemito = document.getElementById('trans-rem-nro').value.trim();
  const pvId = document.getElementById('trans-rem-pv').value;
  if (!nroRemito || !pvId) { toast('Completá número de remito y punto de venta', 'error'); return; }

  const pvs = await dbGet('puntos_venta');
  const pv = pvs.find(p => p.id === pvId);
  const equipos = (DB.get('equipos_sap_transito') || []).filter(e => e.nro_pedido === nroPedido);
  const hoy = new Date().toLocaleDateString('es-AR');

  const nuevosDisp = equipos.map(e => ({
    id: DB.genId(), nro_serie: e.serial, material: e.material,
    texto: e.texto, marca: detectarMarcaPorPrefijo(e.texto),
    precio: e.precio || 0, estado: 'disponible',
    punto_venta_id: pvId, punto_venta_nombre: pv?.nombre || '',
    nro_remito: nroRemito, nro_pedido: nroPedido,
    centro: e.centro || '', fecha_ingreso: hoy,
  }));

  const total = equipos.reduce((s, e) => s + (e.precio || 0), 0);

  await SB.insert('dispositivos', nuevosDisp, SB_TOKEN);
  await SB.insert('remitos', [{
    id: DB.genId(), nro_remito: nroRemito, nro_pedido: nroPedido, tipo: 'ingreso',
    punto_venta_id: pvId, punto_venta_nombre: pv?.nombre || '',
    fecha: hoy, cantidad_items: equipos.length, total, estado: 'procesado',
  }], SB_TOKEN);

  // Eliminar estos equipos de la tabla de tránsito en Supabase
  const transito = DB.get('equipos_sap_transito') || [];
  const idsEliminar = transito.filter(e => e.nro_pedido === nroPedido).map(e => e.id);
  for (const eid of idsEliminar) {
    await SB.delete('equipos_sap_transito', eid, SB_TOKEN);
  }

  dbInvalidate('dispositivos');
  dbInvalidate('remitos');
  dbInvalidate('equipos_sap_transito');

  toast(`Remito ${nroRemito} generado con ${equipos.length} equipo(s) del pedido ${nroPedido}`);
  cerrarModal('modal-remito-transito');
  navegar('stock');
}

async function guardarRemito() {
  const pv = pvs.find(p => p.id === pvId);

  const filasValidas = remitoManualFilas.filter(f => f.material.trim() && contarSeries(f.series) > 0);

  if (!nro || !pvId || !filasValidas.length) { toast('Completá remito, punto de venta y al menos un material con un IMEI', 'error'); return; }

  const hoy = new Date().toLocaleDateString('es-AR');
  const nuevosDisp = [];
  let total = 0;
  let cantidadEquipos = 0;

  for (const f of filasValidas) {
    const mat = buscarMaterialPorCodigo(f.material);
    const precio = mat?.precio || 0;
    const series = f.series.split('\n').map(s => s.trim()).filter(Boolean);
    for (const serie of series) {
      total += precio;
      cantidadEquipos++;
      nuevosDisp.push({
        id: DB.genId(), nro_serie: serie, material: f.material.trim(),
        texto: mat?.nombre || 'Equipo ingresado', marca: mat?.marca || '',
        precio, estado: 'disponible', punto_venta_id: pvId,
        punto_venta_nombre: pv?.nombre || '', nro_remito: nro,
        nro_pedido: nroPedido, fecha_ingreso: hoy,
      });
    }
  }

  await SB.insert('dispositivos', nuevosDisp, SB_TOKEN);
  await SB.insert('remitos', [{
    id: DB.genId(), nro_remito: nro, nro_pedido: nroPedido, tipo: 'ingreso',
    punto_venta_id: pvId, punto_venta_nombre: pv?.nombre || '',
    fecha: hoy, cantidad_items: cantidadEquipos, total, estado: 'procesado',
  }], SB_TOKEN);
  dbInvalidate('dispositivos');
  dbInvalidate('remitos');

  toast(`Remito ${nro} guardado con ${cantidadEquipos} equipo(s)`);
  irARemitos('historial');
}

async function renderTransferencias() {
  const pvs = await dbGet('puntos_venta');
  return `

    <div class="card" style="max-width:640px">
      <div class="card-header"><h3>Nueva Transferencia entre Puntos de Venta</h3></div>
      <div class="card-body">
        <div class="form-grid">
          <div>
            <div class="form-group">
              <label>Punto de Venta Origen</label>
              <select id="trans-origen">
                <option value="">Seleccionar...</option>
                ${pvs.map(pv => `<option value="${pv.id}">${pv.nombre}</option>`).join('')}
              </select>
            </div>
          </div>
          <div>
            <div class="form-group">
              <label>Punto de Venta Destino</label>
              <select id="trans-destino">
                <option value="">Seleccionar...</option>
                ${pvs.map(pv => `<option value="${pv.id}">${pv.nombre}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="full">
            <div class="form-group">
              <label>IMEIs a transferir (uno por línea)</label>
              <textarea id="trans-series" rows="5" placeholder="354678901234567&#10;354678901234568"></textarea>
            </div>
          </div>
        </div>
        <button class="btn btn-primary" onclick="procesarTransferencia()">Procesar Transferencia</button>
      </div>
    </div>
  `;
}

async function procesarTransferencia() {
  const origenId = document.getElementById('trans-origen').value;
  const destinoId = document.getElementById('trans-destino').value;
  const series = document.getElementById('trans-series').value.split('\n').map(s => s.trim()).filter(Boolean);
  const pvs = await dbGet('puntos_venta');
  const destino = pvs.find(p => p.id === destinoId);

  if (!origenId || !destinoId || !series.length) { toast('Completá todos los campos', 'error'); return; }
  if (origenId === destinoId) { toast('El origen y destino no pueden ser iguales', 'error'); return; }

  const dispositivos = await dbGet('dispositivos');
  let transferidos = 0;
  for (const serie of series) {
    const disp = dispositivos.find(d => d.nro_serie === serie && d.punto_venta_id === origenId);
    if (disp) {
      await SB.update('dispositivos', disp.id, {
        punto_venta_id: destinoId,
        punto_venta_nombre: destino?.nombre || '',
        estado: 'disponible',
      }, SB_TOKEN);
      transferidos++;
    }
  }
  dbInvalidate('dispositivos');
  toast(`${transferidos} equipo(s) transferido(s) correctamente`);
  document.getElementById('trans-series').value = '';
}

function renderCuentas(pvSeleccionado) {

    const totalDebe = movsPV.filter(m => m.tipo === 'debe').reduce((a, m) => a + m.importe, 0);

        <div class="stat-card rojo"><div class="label">Total Debe</div><div class="valor" style="font-size:20px">$${totalDebe.toLocaleString('es-AR')}</div></div>
        <div class="stat-card azul"><div class="label">Saldo</div><div class="valor" style="font-size:20px">$${saldo.toLocaleString('es-AR')}</div></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3 style="font-weight:700">${pv?.nombre} — ${movsPV.length} movimientos</h3>

      </div>
      <div class="tabla-wrapper">
        <table>
          <thead><tr><th>Fecha</th><th>Concepto</th><th>IMEI</th><th>SDS</th><th style="text-align:right;color:var(--verde)">Haber</th><th style="text-align:right;color:var(--rojo)">Debe</th><th style="text-align:right">Saldo</th></tr></thead>
          <tbody>
            ${movsPV.map(m => `
              <tr>
                <td>${m.fecha || '—'}</td>
                <td>${m.concepto}</td>
                <td style="font-family:monospace;font-size:11px">${m.imei || '—'}</td>
                <td style="font-family:monospace;font-size:11px">${m.numero_sds || '—'}</td>
                <td style="text-align:right;color:var(--verde);font-weight:600">${m.tipo === 'haber' ? '$' + m.importe.toLocaleString('es-AR') : ''}</td>
                <td style="text-align:right;color:var(--rojo);font-weight:600">${m.tipo === 'debe' ? '$' + m.importe.toLocaleString('es-AR') : ''}</td>
                <td style="text-align:right;font-weight:700">$${(m.saldo_acumulado || 0).toLocaleString('es-AR')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  // Vista general por PV
  const saldosPV = {};
  for (const m of movimientos) {
    if (!saldosPV[m.punto_venta_id]) saldosPV[m.punto_venta_id] = { haber: 0, debe: 0, saldo: 0, cantidad: 0 };
    if (m.tipo === 'haber') saldosPV[m.punto_venta_id].haber += m.importe;
    if (m.tipo === 'debe') saldosPV[m.punto_venta_id].debe += m.importe;
    saldosPV[m.punto_venta_id].saldo = m.saldo_acumulado;
    saldosPV[m.punto_venta_id].cantidad++;
  }

  return `
    <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr))">
      ${pvs.map(pv => {
        const d = saldosPV[pv.id] || { haber: 0, debe: 0, saldo: 0, cantidad: 0 };

function guardarMovimiento(pvId) {
  const tipo = document.getElementById('mov-tipo').value;
  const importe = parseFloat(document.getElementById('mov-importe').value) || 0;
  const concepto = document.getElementById('mov-concepto').value.trim();
  const imei = document.getElementById('mov-imei').value.trim();
  const sds = document.getElementById('mov-sds').value.trim();

  if (!concepto || !importe) { toast('Completá concepto e importe', 'error'); return; }

  const cuentas = DB.get('cuentas_corrientes');
  const anteriores = cuentas.filter(c => c.punto_venta_id === pvId);
  const saldoAnterior = anteriores.length ? anteriores[anteriores.length - 1].saldo_acumulado : 0;
  const pvs = DB.get('puntos_venta');
  const pv = pvs.find(p => p.id === pvId);

  cuentas.push({
    id: DB.genId(), punto_venta_id: pvId, punto_venta_nombre: pv?.nombre || '',
    tipo, concepto, importe, imei, numero_sds: sds,
    saldo_acumulado: tipo === 'haber' ? saldoAnterior + importe : saldoAnterior - importe,
    fecha: new Date().toLocaleDateString('es-AR'),
  });
  DB.set('cuentas_corrientes', cuentas);
  toast('Movimiento registrado');
  cerrarModal('modal-movimiento');
  document.getElementById('page-content').innerHTML = renderCuentas(pvId);
}

function filtrarLegajos() {
  const busqueda = (document.getElementById('legajo-search')?.value || '').toLowerCase();
  let legajos = DB.get('legajos') || [];
  if (busqueda) legajos = legajos.filter(l =>
    l.imei?.toLowerCase().includes(busqueda) ||
    l.nim?.toLowerCase().includes(busqueda) ||
    l.numero_sds?.toLowerCase().includes(busqueda) ||
    l.apellido?.toLowerCase().includes(busqueda)
  );
  const estadoBadge = { ok: 'badge-verde', error_entidad: 'badge-rojo', error_imei: 'badge-amarillo', pendiente: 'badge-gris' };
  const estadoLabel = { ok: 'OK', error_entidad: 'Error Entidad', error_imei: 'Error IMEI', pendiente: 'Pendiente' };
  document.getElementById('legajos-tabla').innerHTML = tablaLegajos(legajos, estadoBadge, estadoLabel);
}

async function guardarPV(id) {
  const nombre = document.getElementById('pv-nombre').value.trim();
  if (!nombre) { toast('El nombre es requerido', 'error'); return; }
  const entidades = document.getElementById('pv-ents').value.split(',').map(e => e.trim()).filter(Boolean);
  const datos = {
    nombre,
    direccion: document.getElementById('pv-dir').value.trim(),
    telefono: document.getElementById('pv-tel').value.trim(),
    email: document.getElementById('pv-email').value.trim(),
    entidades,
    es_deposito: document.getElementById('pv-deposito').checked,
    activo: true,
  };
  if (id) {
    await SB.update('puntos_venta', id, datos, SB_TOKEN);
  } else {
    await SB.insert('puntos_venta', { id: DB.genId(), ...datos }, SB_TOKEN);
  }
  dbInvalidate('puntos_venta');

// Lee un archivo Excel y devuelve { headers, data }
function leerExcel(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const XLSX = window.XLSX;
        const wb = XLSX.read(e.target.result, { type: 'array', cellDates: false });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
        if (rows.length < 2) { resolve({ headers: [], data: [] }); return; }
        const headers = rows[0].map(h => String(h).trim());
        const data = rows.slice(1).filter(r => r.some(c => c !== ''));
        resolve({ headers, data });
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function parsearFechaExcel(valor) {
  if (!valor) return '';
  if (typeof valor === 'number') {
    // Serial de Excel
    const epoch = new Date(1899, 11, 30);
    const d = new Date(epoch.getTime() + valor * 86400000);
    return d.toLocaleDateString('es-AR');
  }
  const s = String(valor).trim();
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return s;
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return `${iso[3]}/${iso[2]}/${iso[1]}`;
  return s;
}

function findCol(headers, ...candidatos) {
  const norm = s => String(s || '').trim().toLowerCase();
  for (const c of candidatos) {
    const idx = headers.findIndex(h => norm(h) === norm(c));
    if (idx !== -1) return idx;
  }
  for (const c of candidatos) {
    const idx = headers.findIndex(h => norm(h).includes(norm(c)));
    if (idx !== -1) return idx;
  }
  return -1;
}

function detectarMarca(texto) {
  const t = (texto || '').toUpperCase();
  if (t.includes('SAMSUNG')) return 'Samsung';
  if (t.includes('APPLE') || t.includes('IPHONE')) return 'Apple';
  if (t.includes('MOTOROLA') || t.includes('MOTO')) return 'Motorola';
  if (t.includes('XIAOMI') || t.includes('REDMI')) return 'Xiaomi';
  if (t.includes('LG')) return 'LG';
  if (t.includes('HUAWEI')) return 'Huawei';
  if (t.includes('TCL')) return 'TCL';
  if (t.includes('NOKIA')) return 'Nokia';
  if (t.includes('ZTE')) return 'ZTE';
  if (t.includes('ALCATEL')) return 'Alcatel';
  return '';
}

async function cargarArchivoWebcom(key, file) {
  if (!file) return;
  if (!window.XLSX) { await cargarXLSX(); }
  try {
    const sheet = await leerExcel(file);
    importadorState.sheets[key] = sheet;
    // Refresh slot
    document.getElementById('slot-' + key).outerHTML = renderSlotArchivo(key, {
      solicitudes: 'Solicitudes', solicitantes: 'Solicitantes',
      terminales: 'Terminales', pagos: 'Pagos Asociados'
    }[key]);
    // Habilitar botón si todos están
    const todos = ['solicitudes','solicitantes','terminales','pagos'].every(k => importadorState.sheets[k]);
    const btn = document.getElementById('btn-procesar-webcom');
    if (btn) btn.disabled = !todos;
    toast(`Archivo ${key} cargado (${sheet.data.length} filas)`);
  } catch(e) {
    toast('Error al leer el archivo: ' + e.message, 'error');
  }
}

function quitarArchivo(key) {
  delete importadorState.sheets[key];
  document.getElementById('slot-' + key).outerHTML = renderSlotArchivo(key, {
    solicitudes: 'Solicitudes', solicitantes: 'Solicitantes',
    terminales: 'Terminales', pagos: 'Pagos Asociados'
  }[key]);
  const btn = document.getElementById('btn-procesar-webcom');
  if (btn) btn.disabled = true;
}

function cargarXLSX() {
  return new Promise((resolve, reject) => {
    if (window.XLSX) { resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

function procesarWebcom() {
  const { solicitudes, solicitantes, terminales, pagos } = importadorState.sheets;
  if (!solicitudes || !solicitantes || !terminales || !pagos) {
    toast('Falta algún archivo', 'error'); return;
  }

  // Indexar por ID SDS
  function indexarPorSDS(sheet) {
    const idIdx = findCol(sheet.headers, 'Id Sds', 'id sds', 'IDSDS', 'id_sds');
    if (idIdx === -1) return {};
    const map = {};
    for (const row of sheet.data) {
      const id = String(row[idIdx] || '').trim();
      if (id) map[id] = row;
    }
    return map;
  }

  const pagosMap = indexarPorSDS(pagos);
  const solicitantesMap = indexarPorSDS(solicitantes);
  const terminalesMap = indexarPorSDS(terminales);
  const solicitudesMap = indexarPorSDS(solicitudes);

  const todosIds = new Set([
    ...Object.keys(pagosMap), ...Object.keys(solicitantesMap),
    ...Object.keys(terminalesMap), ...Object.keys(solicitudesMap),
  ]);

  const pvs = DB.get('puntos_venta');
  const pvMap = {};
  for (const pv of pvs) {
    for (const ent of (pv.entidades || [])) pvMap[String(ent).trim()] = pv;
  }

  const dispositivos = DB.get('dispositivos');
  const dispMap = {};
  for (const d of dispositivos) if (d.nro_serie) dispMap[d.nro_serie] = d;

  let legajosOk = 0, legajosError = 0, imeisPendientes = [];
  const legajosNuevos = [];

  for (const idSds of todosIds) {
    const rowPagos = pagosMap[idSds];
    const rowSol = solicitantesMap[idSds];
    const rowTerm = terminalesMap[idSds];
    const rowSolic = solicitudesMap[idSds];

    const errores = [];

    // Fecha activación
    let fechaAct = '';
    if (rowPagos) {
      const i = findCol(pagos.headers, 'Fecha Activación', 'Fecha Activacion', 'fecha activación');
      if (i !== -1) fechaAct = parsearFechaExcel(rowPagos[i]);
    }

    // IMEI
    let imei = '';
    if (rowTerm) {
      const i = findCol(terminales.headers, 'Nro Serie', 'nro serie', 'IMEI', 'Serie');
      if (i !== -1) imei = String(rowTerm[i] || '').trim();
    }

    // NIM
    let nim = '';
    if (rowPagos) {
      const i = findCol(pagos.headers, 'Bill Number', 'Nim', 'NIM', 'nim');
      if (i !== -1) nim = String(rowPagos[i] || '').trim();
    }

    // Entidad
    let entidad = '';
    if (rowSolic) {
      const i = findCol(solicitudes.headers, 'Entidad', 'entidad', 'entity');
      if (i !== -1) entidad = String(rowSolic[i] || '').trim();
    }

    // Importe
    let importe = 0;
    if (rowPagos) {
      const i = findCol(pagos.headers, 'Importe', 'importe', 'monto', 'Amount');
      if (i !== -1) importe = parseFloat(rowPagos[i]) || 0;
    }

    // Datos cliente
    let apellido = '', nombre = '', dni = '', telefono = '';
    if (rowSol) {
      const iAp = findCol(solicitantes.headers, 'Apellido', 'apellido');
      const iNom = findCol(solicitantes.headers, 'Nombre', 'nombre');
      const iDni = findCol(solicitantes.headers, 'Documento', 'documento', 'DNI', 'dni');
      const iTel = findCol(solicitantes.headers, 'Telefono', 'teléfono', 'tel');
      if (iAp !== -1) apellido = String(rowSol[iAp] || '').trim();
      if (iNom !== -1) nombre = String(rowSol[iNom] || '').trim();
      if (iDni !== -1) dni = String(rowSol[iDni] || '').trim();
      if (iTel !== -1) telefono = String(rowSol[iTel] || '').trim();
    }

    // Validaciones
    const pv = pvMap[entidad];
    if (!pv && entidad) errores.push(`Entidad ${entidad} no mapeada a ningún PV`);
    if (!imei) errores.push('IMEI no encontrado en terminales');
    if (imei && !dispMap[imei]) imeisPendientes.push({ imei, tipo: 'equipo', entidad_id: entidad, id_sds: idSds });

    const estado = errores.length === 0 ? 'ok' : (imei && !dispMap[imei] ? 'error_imei' : 'error_entidad');
    if (estado === 'ok') legajosOk++; else legajosError++;

    legajosNuevos.push({
      id: DB.genId(), id_sds: idSds, numero_sds: idSds,
      fecha_activacion: fechaAct, nim, imei, importe,
      entidad_id: entidad, punto_venta_id: pv?.id || '', punto_venta_nombre: pv?.nombre || '',
      apellido, nombre, doc_numero: dni, telefono,
      estado, errores, origen_archivo: 'webcom',
    });

    // Actualizar dispositivo si existe y es ok
    if (estado === 'ok' && dispMap[imei]) {
      const disps = DB.get('dispositivos');
      const idx = disps.findIndex(d => d.nro_serie === imei);
      if (idx !== -1) {
        disps[idx].estado = 'vendido';
        disps[idx].fecha_venta = fechaAct;
        disps[idx].notas = `Vendido - NIM: ${nim} | ${apellido} ${nombre} | SDS: ${idSds}`;
        DB.set('dispositivos', disps);
      }
      // Registrar en cuenta corriente
      if (pv && importe > 0) {
        const cuentas = DB.get('cuentas_corrientes');
        const anteriores = cuentas.filter(c => c.punto_venta_id === pv.id);
        const saldoAnt = anteriores.length ? anteriores[anteriores.length - 1].saldo_acumulado : 0;
        cuentas.push({
          id: DB.genId(), punto_venta_id: pv.id, punto_venta_nombre: pv.nombre,
          tipo: 'haber', concepto: `Venta IMEI ${imei} - SDS ${idSds}`,
          importe, saldo_acumulado: saldoAnt + importe,
          imei, numero_sds: idSds, fecha: fechaAct,
        });
        DB.set('cuentas_corrientes', cuentas);
      }
    }
  }

  // Guardar legajos
  const legajosExistentes = DB.get('legajos') || [];
  DB.set('legajos', [...legajosExistentes, ...legajosNuevos]);

  // Guardar IMEIs pendientes
  const pendExist = DB.get('imeis_pendientes') || [];
  DB.set('imeis_pendientes', [...pendExist, ...imeisPendientes]);

  // Mostrar resultado
  const res = document.getElementById('webcom-resultado');
  const legajosConError = legajosNuevos.filter(l => l.errores && l.errores.length > 0);
  window._ultimoLogImportacion = legajosNuevos; // para descarga de log

  if (res) {
    res.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;margin-top:16px">
        <div class="stat-card" style="padding:14px;text-align:center"><div class="label">Total SDS</div><div class="valor" style="font-size:22px">${legajosNuevos.length}</div></div>
        <div class="stat-card verde" style="padding:14px;text-align:center"><div class="label">Procesados OK</div><div class="valor" style="font-size:22px">${legajosOk}</div></div>
        <div class="stat-card rojo" style="padding:14px;text-align:center"><div class="label">Con errores</div><div class="valor" style="font-size:22px">${legajosError}</div></div>
      </div>

      ${imeisPendientes.length ? `
        <div style="background:var(--amarillo-suave);border:1px solid #fde68a;border-radius:8px;padding:12px;margin-bottom:12px">
          <p style="font-weight:600;color:var(--amarillo);font-size:13px">⚠️ ${imeisPendientes.length} IMEIs no encontrados en stock</p>
          <p style="font-size:12px;color:var(--gris-700);margin-top:4px">Guardados como pendientes. Creá los remitos de ingreso correspondientes.</p>
          <div style="max-height:100px;overflow-y:auto;margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">
            ${imeisPendientes.map(ip => `<span class="badge badge-amarillo" style="font-family:monospace">${ip.imei}</span>`).join('')}
          </div>
        </div>
      ` : ''}

      ${legajosConError.length ? `
        <div style="background:var(--rojo-suave);border:1px solid #fca5a5;border-radius:8px;padding:12px;margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <p style="font-weight:600;color:var(--rojo);font-size:13px">❌ ${legajosConError.length} SDS con errores — detalle para corregir</p>
            <button class="btn btn-sm btn-secondary" onclick="descargarLogErrores()">⬇️ Descargar log (.txt)</button>
          </div>
          <div style="max-height:240px;overflow-y:auto;background:white;border-radius:6px">
            <table>
              <thead><tr><th>N° SDS</th><th>IMEI</th><th>Entidad</th><th>NIM</th><th>Errores</th></tr></thead>
              <tbody>
                ${legajosConError.map(l => `
                  <tr>
                    <td style="font-family:monospace;font-weight:600">${l.id_sds}</td>
                    <td style="font-family:monospace;font-size:11px">${l.imei || '—'}</td>
                    <td style="font-family:monospace;font-size:11px">${l.entidad_id || '—'}</td>
                    <td style="font-family:monospace;font-size:11px">${l.nim || '—'}</td>

      ` : ''}

  importadorState.sheets = {};

}

function descargarLogErrores() {
  const legajos = window._ultimoLogImportacion || [];
  const conError = legajos.filter(l => l.errores && l.errores.length > 0);
  if (!conError.length) { toast('No hay errores para exportar', 'warning'); return; }

  let texto = `LOG DE ERRORES DE IMPORTACIÓN — ${new Date().toLocaleString('es-AR')}\n`;
  texto += `Total SDS con error: ${conError.length}\n`;
  texto += '='.repeat(60) + '\n\n';

  for (const l of conError) {
    texto += `SDS: ${l.id_sds}\n`;
    texto += `  IMEI: ${l.imei || '—'}\n`;
    texto += `  NIM: ${l.nim || '—'}\n`;
    texto += `  Entidad: ${l.entidad_id || '—'}\n`;
    texto += `  Cliente: ${l.apellido || ''} ${l.nombre || ''}\n`;
    texto += `  Errores:\n`;
    for (const e of l.errores) texto += `    - ${e}\n`;
    texto += '\n';
  }

  const blob = new Blob([texto], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `log_errores_importacion_${Date.now()}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

async function cargarRemitoExcel(file) {
  if (!file) return;
  if (!window.XLSX) await cargarXLSX();
  const preview = document.getElementById('remito-preview');
  preview.innerHTML = '<p style="color:var(--gris-500);font-size:13px">Leyendo archivo...</p>';
  try {
    const sheet = await leerExcel(file);
    const { headers, data } = sheet;

    // Detectar columnas
    const iSerie = findCol(headers, 'Nro.Serie', 'NRO.SERIE', 'nro_serie', 'IMEI', 'Serie', 'serial');
    const iTexto = findCol(headers, 'Texto', 'TEXTO', 'texto', 'Descripcion', 'modelo');
    const iMat   = findCol(headers, 'Material', 'MATERIAL', 'material', 'Cod.Material');
    const iPrecio= findCol(headers, 'Precio', 'PRECIO', 'precio', 'Valor', 'Importe');

    const items = data.map(row => ({
      nro_serie: String(row[iSerie] ?? '').trim(),
      texto: String(row[iTexto] ?? '').trim(),
      material: String(row[iMat] ?? '').trim(),
      precio: parseFloat(row[iPrecio]) || 0,
      fec_antiguedad: iFec !== -1 ? parsearFechaExcel(row[iFec]) : '',
      nro_pedido: iPedido !== -1 ? String(row[iPedido] ?? '').trim() : '',
    })).filter(it => /^\d{15}$/.test(it.nro_serie) || /^\d{19}$/.test(it.nro_serie));

    preview.innerHTML = `
      <div style="background:var(--verde-suave);border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px">

}

function importarRemitoExcel(items) {
  const pvId = document.getElementById('remito-pv-import')?.value;
  const nroRemito = document.getElementById('remito-nro-import')?.value.trim();
  if (!pvId || !nroRemito) { toast('Seleccioná punto de venta y número de remito', 'error'); return; }
  const pvs = DB.get('puntos_venta');
  const pv = pvs.find(p => p.id === pvId);
  const hoy = new Date().toLocaleDateString('es-AR');
  const dispositivos = DB.get('dispositivos');

  let agregados = 0;
  for (const it of items) {
    if (!it.nro_serie) continue;
    const diasAnt = it.fec_antiguedad ? calcularDiasDesde(it.fec_antiguedad) : 0;
    dispositivos.push({
      id: DB.genId(), nro_serie: it.nro_serie, texto: it.texto, material: it.material,
      marca: detectarMarca(it.texto), precio: it.precio,
      estado: 'disponible', punto_venta_id: pvId, punto_venta_nombre: pv?.nombre || '',
      nro_remito: nroRemito, nro_pedido: it.nro_pedido,
      fecha_ingreso: hoy, fec_antiguedad: it.fec_antiguedad, dias_antiguedad: diasAnt,
    });
    agregados++;
  }
  DB.set('dispositivos', dispositivos);

  const remitos = DB.get('remitos');
  remitos.push({
    id: DB.genId(), nro_remito: nroRemito, tipo: 'ingreso',
    punto_venta_id: pvId, punto_venta_nombre: pv?.nombre || '',
    fecha: hoy, cantidad_items: agregados,
    total: items.reduce((s, i) => s + i.precio, 0), estado: 'procesado',
  });
  DB.set('remitos', remitos);
  toast(`${agregados} equipos importados al stock`);
  navegar('stock');
}

function calcularDiasDesde(fechaStr) {
  if (!fechaStr) return 0;
  let partes;
  if (fechaStr.includes('/')) partes = fechaStr.split('/');
  else if (fechaStr.includes('-')) partes = fechaStr.split('-').reverse();
  else return 0;
  if (partes.length !== 3) return 0;
  const [d, m, a] = partes.map(Number);
  const fecha = new Date(a, m - 1, d);
  const hoy = new Date();
  hoy.setHours(0, 0, 0, 0);
  return Math.floor((hoy - fecha) / 86400000);
}

function semaforoDias(dias) {
  if (dias >= 140) return { color: '#7f1d1d', bg: '#fef2f2', border: '#fca5a5', label: '🔴 FACTURADO', orden: 0 };
  if (dias >= 110) return { color: '#92400e', bg: '#fff7ed', border: '#fdba74', label: '🟠 URGENTE', orden: 1 };
  if (dias >= 80)  return { color: '#854d0e', bg: '#fefce8', border: '#fde047', label: '🟡 FONDO GARANTÍA', orden: 2 };
  if (dias >= 50)  return { color: '#1e40af', bg: '#eff6ff', border: '#93c5fd', label: '🔵 En Plazo', orden: 3 };
  return { color: '#166534', bg: '#f0fdf4', border: '#86efac', label: '🟢 OK', orden: 4 };
}

function renderComodatos() {
  const dispositivos = DB.get('dispositivos').filter(d =>
    d.estado === 'disponible' || d.estado === 'reservado'
  );

  // Calcular días para cada uno
  const conDias = dispositivos.map(d => {
    const dias = d.fec_antiguedad ? calcularDiasDesde(d.fec_antiguedad) :
                 d.fecha_ingreso ? calcularDiasDesde(d.fecha_ingreso) : 0;
    return { ...d, diasReales: dias };
  }).sort((a, b) => b.diasReales - a.diasReales);

  // Estadísticas por semáforo
  const grupos = { facturado: 0, urgente: 0, fondoGarantia: 0, enPlazo: 0, ok: 0 };
  for (const d of conDias) {
    if (d.diasReales >= 140) grupos.facturado++;
    else if (d.diasReales >= 110) grupos.urgente++;
    else if (d.diasReales >= 80) grupos.fondoGarantia++;
    else if (d.diasReales >= 50) grupos.enPlazo++;
    else grupos.ok++;
  }

  return `
    <div style="background:linear-gradient(135deg,#1a1a1a,#3a0000);border-radius:12px;padding:18px 20px;margin-bottom:20px;color:white">
      <p style="font-size:12px;opacity:.6;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">Sistema de Comodatos — Claro AMX</p>
      <p style="font-size:13px;opacity:.85">Los equipos en consignación tienen <strong>80 días</strong> antes de entrar a Fondo de Garantía y <strong>140 días</strong> antes de ser facturados. Vendelos antes.</p>
    </div>

    <!-- Semáforo resumen -->
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px">
      ${[
        { label: 'FACTURADO', dias: '≥140d', val: grupos.facturado, sem: semaforoDias(140) },
        { label: 'URGENTE', dias: '110-139d', val: grupos.urgente, sem: semaforoDias(115) },
        { label: 'FONDO GARANTÍA', dias: '80-109d', val: grupos.fondoGarantia, sem: semaforoDias(85) },
        { label: 'EN PLAZO', dias: '50-79d', val: grupos.enPlazo, sem: semaforoDias(60) },
        { label: 'OK', dias: '<50d', val: grupos.ok, sem: semaforoDias(10) },
      ].map(g => `
        <div style="background:${g.sem.bg};border:1px solid ${g.sem.border};border-radius:10px;padding:14px;text-align:center">
          <div style="font-size:22px;font-weight:800;color:${g.sem.color}">${g.val}</div>
          <div style="font-size:10px;font-weight:700;color:${g.sem.color};margin-top:3px">${g.label}</div>
          <div style="font-size:10px;color:${g.sem.color};opacity:.7">${g.dias}</div>
        </div>
      `).join('')}
    </div>

    <!-- Filtros -->
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      <select id="comodato-filtro" onchange="filtrarComodatos()" style="padding:8px 12px;border:1.5px solid var(--gris-300);border-radius:6px;font-size:13px;outline:none;background:white">
        <option value="">Todos los estados</option>
        <option value="140">🔴 Facturado (≥140 días)</option>
        <option value="110">🟠 Urgente (≥110 días)</option>
        <option value="80">🟡 Fondo Garantía (≥80 días)</option>
        <option value="50">🔵 En Plazo (≥50 días)</option>
      </select>
      <select id="comodato-pv" onchange="filtrarComodatos()" style="padding:8px 12px;border:1.5px solid var(--gris-300);border-radius:6px;font-size:13px;outline:none;background:white">
        <option value="">Todos los PV</option>
        ${DB.get('puntos_venta').map(pv => `<option value="${pv.id}">${pv.nombre}</option>`).join('')}
      </select>
      <span style="font-size:12px;color:var(--gris-500);margin-left:4px">${conDias.length} equipos en seguimiento</span>
    </div>

    <!-- Tabla -->

      ${tablaComodatos(conDias)}

  `;

function tablaComodatos(items) {
  if (!items.length) return `<div class="empty-state"><p>No hay equipos en comodato activos</p></div>`;
  return `
    <table>
      <thead>
        <tr>
          <th>Estado</th>

          <th>IMEI</th>
          <th>Descripción</th>
          <th>Marca</th>
          <th>Punto de Venta</th>
          <th>Fec. Antigüedad</th>
          <th>Vence en</th>
        </tr>
      </thead>
      <tbody>
        ${items.map(d => {
          const sem = semaforoDias(d.diasReales);
          const diasParaVencer = Math.max(0, 140 - d.diasReales);
          const diasParaFondo = Math.max(0, 80 - d.diasReales);
          return `
            <tr style="background:${sem.bg}10">
              <td>
                <span style="display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;background:${sem.bg};color:${sem.color};border:1px solid ${sem.border}">
                  ${sem.label}

              </td>
              <td><strong style="font-size:15px;color:${sem.color}">${d.diasReales}</strong><span style="font-size:10px;color:var(--gris-500)"> días</span></td>
              <td style="font-family:monospace;font-size:11px;font-weight:600">${d.nro_serie}</td>
              <td>${d.texto}</td>
              <td>${d.marca || '—'}</td>

              <td style="font-size:11px">
                ${d.diasReales >= 140
                  ? `<span style="color:#7f1d1d;font-weight:700">¡Facturado!</span>`
                  : d.diasReales >= 80
                  ? `<span style="color:#92400e;font-weight:700">${diasParaVencer}d para facturar</span>`
                  : `<span style="color:var(--gris-500)">${diasParaFondo}d para fondo • ${diasParaVencer}d para facturar</span>`
                }
              </td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

function filtrarComodatos() {
  const filtroMin = parseInt(document.getElementById('comodato-filtro')?.value || '0') || 0;
  const pvFiltro = document.getElementById('comodato-pv')?.value || '';
  let items = DB.get('dispositivos').filter(d => d.estado === 'disponible' || d.estado === 'reservado');
  items = items.map(d => ({
    ...d,
    diasReales: d.fec_antiguedad ? calcularDiasDesde(d.fec_antiguedad) :
                d.fecha_ingreso ? calcularDiasDesde(d.fecha_ingreso) : 0,
  }));
  if (filtroMin) items = items.filter(d => d.diasReales >= filtroMin);
  if (pvFiltro) items = items.filter(d => d.punto_venta_id === pvFiltro);
  items.sort((a, b) => b.diasReales - a.diasReales);
  document.getElementById('comodatos-tabla').innerHTML = tablaComodatos(items);
}
