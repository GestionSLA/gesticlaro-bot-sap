function mapearResultadoBot(data) {
  // Convierte el formato del bot (Material, Serial, Texto, Centro, Precio,
  // Dias_Antiguedad, Semaforo, Fecha_Antiguedad, Nro_Pedido, Categoria, Origen)
  // al formato interno InventarioSAP
  return data.map(r => ({
    material: String(r.Material || '').trim(),
    serial: String(r.Serial || '').trim(),
    texto: String(r.Texto || '').trim(),
    centro: String(r.Centro || '').trim(),
    precio: parseFloat(String(r.Precio || '0').replace(/[^\d.-]/g, '')) || 0,
    dias: parseInt(String(r.Dias_Antiguedad || '0').replace(/[^\d-]/g, '')) || 0,
    semaforo: String(r.Semaforo || '').trim(),
    fec_antiguedad: String(r.Fecha_Antiguedad || '').trim(),
    nro_pedido: String(r.Nro_Pedido || '').trim(),
    categoria: r.Categoria === 'Stock en Tránsito' ? 'Stock en Tránsito' : 'Stock actual',
    origen: r.Origen || (r.Categoria === 'Stock en Tránsito' ? 'transito' : 'principal'),
  })).filter(r => r.serial.length > 5);
}

function mostrarEstadoBot(html, tipo) {
  const el = document.getElementById('bot-estado');
  if (!el) return;
  const colores = { info: 'azul', ok: 'verde', error: 'rojo', warn: 'amarillo' };
  const c = colores[tipo] || 'azul';
  el.innerHTML = `<div style="background:var(--${c}-suave);border:1px solid var(--${c});border-radius:8px;padding:10px 14px;font-size:13px;color:var(--${c});display:flex;align-items:center;gap:8px">${html}</div>`;
}

async function importarStockSAP() {
  const jsonUrl = document.getElementById('sap-json-url').value.trim();
  if (!jsonUrl) { toast('Pegá la URL del JSON de GitHub', 'error'); return; }
  localStorage.setItem('gc_sap_json_url', jsonUrl);

  const btn = document.getElementById('btn-importar-sap');
  btn.disabled = true;
  mostrarEstadoBot('🔄 Descargando datos...', 'info');

  try {
    // cache-buster para evitar que el navegador devuelva una versión vieja del JSON
    const resp = await fetch(`${jsonUrl}?t=${Date.now()}`, { cache: 'no-store' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();

    if (json.status === 'error') {
      mostrarEstadoBot(`❌ El último corrido del bot falló: ${json.mensaje}`, 'error');
      btn.disabled = false;
      return;
    }

    const inventarioSAP = mapearResultadoBot(json.data || []);
    if (!inventarioSAP.length) {
      mostrarEstadoBot('⚠️ El archivo no tiene registros todavía. Esperá a que corra el workflow de GitHub Actions.', 'warn');
      btn.disabled = false;
      return;
    }

    DB.set('inventario_sap', inventarioSAP);

    // Separar en dos bases: Stock SAP Conciliado (principal + reingreso) y
    // Equipos SAP Tránsito (para generar remitos de ingreso por pedido).
    const stockConciliado = inventarioSAP.filter(s => s.origen !== 'transito');
    const equiposTransito = inventarioSAP.filter(s => s.origen === 'transito');
    DB.set('stock_sap_conciliado', stockConciliado);
    DB.set('equipos_sap_transito', equiposTransito);

    // Actualizar días de antigüedad reales en nuestro stock por IMEI
    const dispositivos = DB.get('dispositivos');
    const sapMap = {};
    for (const s of inventarioSAP) sapMap[s.serial] = s;
    let actualizados = 0;
    for (const d of dispositivos) {
      const sap = sapMap[d.nro_serie];
      if (sap) {
        d.dias_antiguedad = sap.dias;
        if (sap.fec_antiguedad) d.fec_antiguedad = sap.fec_antiguedad;
        actualizados++;
      }
    }
    DB.set('dispositivos', dispositivos);

    const fecha = json.actualizado ? new Date(json.actualizado).toLocaleString('es-AR') : '—';
    mostrarEstadoBot(`✅ ${inventarioSAP.length} registros (${stockConciliado.length} conciliado, ${equiposTransito.length} en tránsito · actualizado: ${fecha}). ${actualizados} equipos de tu stock fueron actualizados con sus días de antigüedad reales.`, 'ok');

    // Mostrar tabla
    document.getElementById('bot-tabla-resultado').innerHTML = `
      <div class="tabla-wrapper" style="max-height:320px;overflow-y:auto">
        <table>
          <thead><tr><th>Serial / IMEI</th><th>Material</th><th>Descripción</th><th>Centro</th><th>Días</th><th>Origen</th><th>Categoría</th><th style="text-align:right">Precio</th></tr></thead>
          <tbody>
            ${inventarioSAP.map(s => {
              const sem = semaforoDias(s.dias);
              const origenBadge = s.origen === 'reingreso' ? '<span class="badge badge-naranja">Reingreso</span>' :
                                   s.origen === 'transito' ? '<span class="badge badge-azul">Tránsito</span>' :
                                   '<span class="badge badge-gris">Principal</span>';
              return `<tr>
                <td style="font-family:monospace;font-size:11px;font-weight:600">${s.serial}</td>
                <td style="font-family:monospace;font-size:11px">${s.material}</td>
                <td>${s.texto}</td>
                <td>${s.centro}</td>
                <td><span style="color:${sem.color};font-weight:600">${s.dias}d</span></td>
                <td>${origenBadge}</td>
                <td>${s.categoria}</td>
                <td style="text-align:right">$${s.precio.toLocaleString('es-AR')}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;

    // Ejecutar conciliación automáticamente
    ejecutarConciliacion(inventarioSAP);
    btn.disabled = false;

  } catch (e) {
    mostrarEstadoBot(`❌ No se pudo descargar el archivo: ${e.message}. Verificá que la URL sea correcta y que el repo sea público (o que el workflow ya haya corrido al menos una vez).`, 'error');
    btn.disabled = false;
  }
}

async function cargarInventarioSAP(file) {
  if (!file) return;
  if (!window.XLSX) await cargarXLSX();
  const info = document.getElementById('sap-info');
  info.innerHTML = '<p style="font-size:12px;color:var(--gris-500)">Leyendo archivo SAP...</p>';

  try {
    const sheet = await leerExcel(file);
    const { headers, data } = sheet;

    const iSerial  = findCol(headers, 'Serial', 'Nro.Serie', 'NRO.SERIE', 'IMEI', 'serie', 'serial');
    const iMat     = findCol(headers, 'Material', 'material', 'MATERIAL', 'Cod.Material');
    const iTexto   = findCol(headers, 'Texto', 'texto', 'TEXTO', 'Descripcion');
    const iCentro  = findCol(headers, 'Centro', 'centro', 'CENTRO');
    const iPrecio  = findCol(headers, 'Precio', 'precio', 'PRECIO', 'Valor');
    const iDias    = findCol(headers, 'Días Antigüedad', 'Dias', 'dias_antiguedad', 'Antigüedad');
    const iSem     = findCol(headers, 'Semáforo', 'Semaforo', 'semaforo', 'Estado');
    const iPedido  = findCol(headers, 'Nro.Pedido', 'nro_pedido', 'Pedido');
    const iCat     = findCol(headers, 'Categoría', 'Categoria', 'categoria', 'Tipo');

    const inventarioSAP = data.map(row => ({
      serial:  String(row[iSerial]  ?? '').trim(),
      material: String(row[iMat]   ?? '').trim(),
      texto:   String(row[iTexto]  ?? '').trim(),
      centro:  String(row[iCentro] ?? '').trim(),
      precio:  parseFloat(row[iPrecio])  || 0,
      dias:    parseInt(row[iDias])      || 0,
      semaforo: String(row[iSem]  ?? '').trim(),
      nro_pedido: String(row[iPedido] ?? '').trim(),
      categoria: String(row[iCat] ?? '').trim(),
    })).filter(r => r.serial.length > 5);

    // Guardar en DB
    DB.set('inventario_sap', inventarioSAP);

    info.innerHTML = `<div style="background:var(--verde-suave);border:1px solid #bbf7d0;border-radius:6px;padding:8px 12px;font-size:12px;color:var(--verde);font-weight:600">✅ ${inventarioSAP.length} registros SAP cargados</div>`;

    // Ejecutar conciliación
    ejecutarConciliacion(inventarioSAP);

  } catch(e) {
    info.innerHTML = `<p style="color:var(--rojo);font-size:12px">Error: ${e.message}</p>`;
  }
}

function ejecutarConciliacion(inventarioSAP) {
  const dispositivos = DB.get('dispositivos');
  const dispMap = {};
  for (const d of dispositivos) if (d.nro_serie) dispMap[d.nro_serie] = d;

  const sapMap = {};
  for (const s of inventarioSAP) if (s.serial) sapMap[s.serial] = s;

  // 1. En SAP pero NO en nuestro sistema
  const soloEnSAP = inventarioSAP.filter(s => !dispMap[s.serial]);

  // 2. En nuestro sistema pero NO en SAP
  const soloEnLocal = dispositivos.filter(d =>
    d.estado === 'disponible' && !sapMap[d.nro_serie]
  );

  // 3. En ambos — verificar diferencias
  const diferencias = [];
  for (const sap of inventarioSAP) {
    const local = dispMap[sap.serial];
    if (!local) continue;
    const diffs = [];
    if (local.estado === 'vendido' && sap.semaforo !== 'vendido') diffs.push('Vendido local pero no en SAP');
    if (sap.dias > 140) diffs.push(`ALERTA: ${sap.dias} días — ya debería estar facturado`);
    else if (sap.dias > 80) diffs.push(`En Fondo de Garantía: ${sap.dias} días`);
    if (diffs.length) diferencias.push({ ...sap, local, diffs });
  }

  const resultado = document.getElementById('conciliacion-resultado');
  resultado.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">
      <div class="stat-card rojo" style="padding:14px;text-align:center">
        <div class="label">Solo en SAP (falta en tu stock)</div>
        <div class="valor" style="font-size:24px">${soloEnSAP.length}</div>
        <div class="sub">Equipos a ingresar</div>
      </div>
      <div class="stat-card naranja" style="padding:14px;text-align:center">
        <div class="label">Solo en tu stock (no en SAP)</div>
        <div class="valor" style="font-size:24px">${soloEnLocal.length}</div>
        <div class="sub">Equipos a verificar</div>
      </div>
      <div class="stat-card amarillo" style="padding:14px;text-align:center">
        <div class="label">Diferencias detectadas</div>
        <div class="valor" style="font-size:24px">${diferencias.length}</div>
        <div class="sub">Requieren atención</div>
      </div>
    </div>

    ${soloEnSAP.length ? `
      <div class="card" style="margin-bottom:16px">
        <div class="card-header" style="background:var(--rojo-suave)">
          <h3 style="color:var(--rojo)">🔴 ${soloEnSAP.length} equipos en SAP que no están en tu sistema</h3>
        </div>
        <div class="card-body" style="padding:0">
          <div style="max-height:250px;overflow-y:auto">
            <table>
              <thead><tr><th>Serial / IMEI</th><th>Material</th><th>Descripción</th><th>Centro</th><th>Días</th><th style="text-align:right">Precio</th></tr></thead>
              <tbody>
                ${soloEnSAP.slice(0, 100).map(s => {
                  const sem = semaforoDias(s.dias);
                  return `<tr>
                    <td style="font-family:monospace;font-size:11px;font-weight:600">${s.serial}</td>
                    <td style="font-family:monospace;font-size:11px">${s.material}</td>
                    <td>${s.texto}</td>
                    <td>${s.centro}</td>
                    <td><span style="color:${sem.color};font-weight:600">${s.dias}d</span></td>
                    <td style="text-align:right">$${s.precio.toLocaleString('es-AR')}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    ` : ''}

    ${soloEnLocal.length ? `
      <div class="card" style="margin-bottom:16px">
        <div class="card-header" style="background:var(--naranja-suave)">
          <h3 style="color:var(--naranja)">🟠 ${soloEnLocal.length} equipos en tu stock que no están en SAP</h3>
        </div>
        <div class="card-body" style="padding:0">
          <div style="max-height:200px;overflow-y:auto">
            <table>
              <thead><tr><th>IMEI</th><th>Descripción</th><th>Punto de Venta</th><th>Remito</th><th>Ingreso</th></tr></thead>
              <tbody>
                ${soloEnLocal.slice(0, 100).map(d => `<tr>
                  <td style="font-family:monospace;font-size:11px;font-weight:600">${d.nro_serie}</td>
                  <td>${d.texto}</td>
                  <td>${d.punto_venta_nombre || '—'}</td>
                  <td style="font-family:monospace;font-size:11px">${d.nro_remito || '—'}</td>
                  <td>${d.fecha_ingreso || '—'}</td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    ` : ''}

    ${diferencias.length ? `
      <div class="card">
        <div class="card-header" style="background:var(--amarillo-suave)">
          <h3 style="color:var(--amarillo)">⚠️ ${diferencias.length} diferencias entre sistemas</h3>
        </div>
        <div class="card-body" style="padding:0">
          <table>
            <thead><tr><th>IMEI</th><th>Descripción</th><th>Días SAP</th><th>Diferencias detectadas</th></tr></thead>
            <tbody>
              ${diferencias.map(d => `<tr>
                <td style="font-family:monospace;font-size:11px;font-weight:600">${d.serial}</td>
                <td>${d.texto}</td>
                <td><strong style="color:${semaforoDias(d.dias).color}">${d.dias}d</strong></td>
                <td>${d.diffs.map(df => `<span class="badge badge-amarillo" style="margin-right:4px;font-size:10px">${df}</span>`).join('')}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    ` : ''}

    ${!soloEnSAP.length && !soloEnLocal.length && !diferencias.length ? `
      <div style="background:var(--verde-suave);border:1px solid #bbf7d0;border-radius:10px;padding:24px;text-align:center">
        <div style="font-size:32px;margin-bottom:8px">✅</div>
        <p style="font-weight:700;color:var(--verde);font-size:16px">¡Stock conciliado! No hay diferencias.</p>
      </div>
    ` : ''}
  `;
}

let remitoManualFilas = [];

function inicializarFilasRemitoManual() {
  remitoManualFilas = [{ id: DB.genId(), material: '', series: '' }];
  renderFilasRemitoManual();
}

function agregarFilaRemitoManual() {
  remitoManualFilas.push({ id: DB.genId(), material: '', series: '' });
  renderFilasRemitoManual();
}

function quitarFilaRemitoManual(id) {
  if (remitoManualFilas.length <= 1) { toast('Debe quedar al menos una fila', 'warning'); return; }
  remitoManualFilas = remitoManualFilas.filter(f => f.id !== id);
  renderFilasRemitoManual();
}

function contarSeries(texto) {
  return (texto || '').split('\n').map(s => s.trim()).filter(Boolean).length;
}

function renderFilasRemitoManual() {
  const cont = document.getElementById('rem-manual-filas');
  if (!cont) return;
  cont.innerHTML = remitoManualFilas.map(f => {
    const mat = buscarMaterialPorCodigo(f.material);
    const cantidad = contarSeries(f.series);
    const subtotal = mat && mat.precio ? mat.precio * cantidad : 0;
    return `
      <tr data-fila-id="${f.id}">
        <td>
          <input type="text" value="${f.material}" placeholder="70013455"
            style="width:100%;font-family:monospace;border:1px solid var(--gris-300);border-radius:4px;padding:5px 7px;font-size:12px"
            oninput="actualizarFilaRemitoManual('${f.id}', 'material', this.value)" />
        </td>
        <td id="desc-${f.id}" style="font-size:12px;color:${mat ? 'var(--gris-800)' : 'var(--gris-400)'}">${mat ? mat.nombre : '—'}</td>
        <td id="marca-${f.id}">${mat ? badgeMarca(mat.marca) : '<span class="badge badge-gris">—</span>'}</td>
        <td>
          <textarea rows="2" placeholder="354678901234567&#10;354678901234568"
            style="width:100%;font-family:monospace;border:1px solid var(--gris-300);border-radius:4px;padding:5px 7px;font-size:11px;resize:vertical"
            oninput="actualizarFilaRemitoManual('${f.id}', 'series', this.value)">${f.series}</textarea>
          <p id="cant-${f.id}" style="font-size:10px;color:var(--gris-500);margin-top:2px">${cantidad ? cantidad + ' IMEI(s)' : ''}</p>
        </td>
        <td id="precio-${f.id}" style="font-size:12px;text-align:right">
          ${mat && mat.precio ? '$' + Number(mat.precio).toLocaleString('es-AR') + (cantidad > 1 ? `<br><span style="font-size:10px;color:var(--gris-500)">Subt: $${subtotal.toLocaleString('es-AR')}</span>` : '') : '—'}
        </td>
        <td>
          <button type="button" onclick="quitarFilaRemitoManual('${f.id}')" style="background:none;border:none;color:var(--rojo);cursor:pointer;font-size:14px">✕</button>
        </td>
      </tr>
    `;
  }).join('');
}

function actualizarFilaRemitoManual(id, campo, valor) {
  const fila = remitoManualFilas.find(f => f.id === id);
  if (!fila) return;
  fila[campo] = valor;

  const mat = buscarMaterialPorCodigo(fila.material);
  const cantidad = contarSeries(fila.series);
  const subtotal = mat && mat.precio ? mat.precio * cantidad : 0;

  if (campo === 'material') {
    document.getElementById(`desc-${id}`).textContent = mat ? mat.nombre : '—';
    document.getElementById(`desc-${id}`).style.color = mat ? 'var(--gris-800)' : 'var(--gris-400)';
    document.getElementById(`marca-${id}`).innerHTML = mat ? badgeMarca(mat.marca) : '<span class="badge badge-gris">—</span>';
  }
  if (campo === 'series') {
    document.getElementById(`cant-${id}`).textContent = cantidad ? cantidad + ' IMEI(s)' : '';
  }
  document.getElementById(`precio-${id}`).innerHTML = mat && mat.precio
    ? '$' + Number(mat.precio).toLocaleString('es-AR') + (cantidad > 1 ? `<br><span style="font-size:10px;color:var(--gris-500)">Subt: $${subtotal.toLocaleString('es-AR')}</span>` : '')
    : '—';
}

function filtrarHistorialRemitos() {
  const buscNro = (document.getElementById('hist-search-remito')?.value || '').toLowerCase().trim();
  const buscPedido = (document.getElementById('hist-search-pedido')?.value || '').toLowerCase().trim();
  const buscImei = (document.getElementById('hist-search-imei')?.value || '').toLowerCase().trim();
  const tipoFiltro = document.getElementById('hist-filtro-tipo')?.value || '';

  let remitos = DB.get('remitos').slice().reverse();

  if (buscNro) remitos = remitos.filter(r => r.nro_remito?.toLowerCase().includes(buscNro));
  if (tipoFiltro) remitos = remitos.filter(r => r.tipo === tipoFiltro);

  if (buscPedido) {
    const dispositivos = DB.get('dispositivos');
    const remitosConPedido = new Set(
      dispositivos.filter(d => d.nro_pedido?.toLowerCase().includes(buscPedido)).map(d => d.nro_remito)
    );
    remitos = remitos.filter(r => remitosConPedido.has(r.nro_remito));
  }

  let coincidenciasImei;
  if (buscImei) {
    const dispositivos = DB.get('dispositivos');
    const remitosConImei = new Set(
      dispositivos.filter(d => d.nro_serie?.toLowerCase().includes(buscImei)).map(d => d.nro_remito).filter(Boolean)
    );
    remitos = remitos.filter(r => remitosConImei.has(r.nro_remito));
    coincidenciasImei = remitosConImei.size;
  }

  document.getElementById('historial-tabla').innerHTML = tablaHistorialRemitos(remitos, coincidenciasImei);
}

async function guardarConfigSistemas() {
  const cfg = {
    sap_usuario: document.getElementById('cfg-sap-usuario').value.trim(),
    sap_password: document.getElementById('cfg-sap-password').value,
    rango_inicio: document.getElementById('cfg-rango-inicio').value.trim(),
    rango_fin: document.getElementById('cfg-rango-fin').value.trim(),
    github_owner: document.getElementById('cfg-gh-owner').value.trim(),
    github_repo: document.getElementById('cfg-gh-repo').value.trim(),
    github_token: document.getElementById('cfg-gh-token').value.trim(),
  };

  if (!cfg.sap_usuario || !cfg.sap_password) {
    toast('Completá usuario y contraseña de SAP', 'error');
    return;
  }

  // Guardar localmente siempre, aunque falle la sincronización con GitHub
  const cfgPrevio = getConfigSistemas();
  localStorage.setItem('gc_config_sistemas', JSON.stringify({ ...cfgPrevio, ...cfg }));
  toast('Configuración guardada localmente');

  if (!cfg.github_owner || !cfg.github_repo || !cfg.github_token) {
    mostrarSyncEstado('⚠️ Guardado solo en el sistema. Para sincronizar automáticamente con el bot, completá los datos de GitHub.', 'error');
    return;
  }

  const btn = document.getElementById('btn-guardar-sistemas');
  btn.disabled = true;
  mostrarSyncEstado('🔄 Sincronizando con el repo de GitHub...', 'info');

  try {
    await sincronizarConfigConGitHub(cfg);
    const ahora = new Date().toLocaleString('es-AR');
    const cfgFinal = { ...getConfigSistemas(), ultima_sync: ahora };
    localStorage.setItem('gc_config_sistemas', JSON.stringify(cfgFinal));
    mostrarSyncEstado(`✅ Sincronizado correctamente (${ahora}). El bot usará estos datos en la próxima corrida.`, 'ok');
    document.getElementById('sync-historial').textContent = `Última sincronización exitosa: ${ahora}`;
  } catch (e) {
    mostrarSyncEstado(`❌ No se pudo sincronizar con GitHub: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
  }
}

async function sincronizarConfigConGitHub(cfg) {
  const { github_owner, github_repo, github_token } = cfg;
  const path = 'data/config_sistemas.json';
  const apiUrl = `https://api.github.com/repos/${github_owner}/${github_repo}/contents/${path}`;

  const contenido = {
    sap_usuario: cfg.sap_usuario,
    sap_password: cfg.sap_password,
    rango_inicio: cfg.rango_inicio,
    rango_fin: cfg.rango_fin,
    actualizado: new Date().toISOString(),
  };

  const headers = {
    Authorization: `Bearer ${github_token}`,
    Accept: 'application/vnd.github+json',
    'Content-Type': 'application/json',
  };

  // 1) Necesitamos el SHA del archivo actual si ya existe (la API de GitHub
  // lo exige para actualizar un archivo existente; si no existe, se omite).
  let sha = null;
  const getResp = await fetch(apiUrl, { headers });
  if (getResp.ok) {
    const data = await getResp.json();
    sha = data.sha;
  } else if (getResp.status !== 404) {
    const errData = await getResp.json().catch(() => ({}));
    throw new Error(errData.message || `HTTP ${getResp.status} al consultar el archivo`);
  }

  // 2) Codificar el contenido en base64 (la API de GitHub lo requiere así)
  const jsonStr = JSON.stringify(contenido, null, 2);
  const base64Content = btoa(unescape(encodeURIComponent(jsonStr)));

  const body = {
    message: `Actualizar configuración de sistemas - ${new Date().toLocaleString('es-AR')}`,
    content: base64Content,
  };
  if (sha) body.sha = sha;

  const putResp = await fetch(apiUrl, {
    method: 'PUT',
    headers,
    body: JSON.stringify(body),
  });

  if (!putResp.ok) {
    const errData = await putResp.json().catch(() => ({}));
    throw new Error(errData.message || `HTTP ${putResp.status} al escribir el archivo. Verificá que el token tenga permiso de escritura sobre el repo.`);
  }

  return true;
}

function mostrarEstadoSync(html, tipo) {
  const el = document.getElementById('sync-sistemas-estado');
  if (!el) return;
  const colores = { info: 'azul', ok: 'verde', error: 'rojo', warn: 'amarillo' };
  const c = colores[tipo] || 'azul';
  el.innerHTML = `<div style="background:var(--${c}-suave);border:1px solid var(--${c});border-radius:8px;padding:10px 14px;font-size:13px;color:var(--${c})">${html}</div>`;
}

async function sincronizarConfigConGitHub() {
  const cfg = leerConfigDesdeFormulario();
  setConfigSistemasAMX(cfg);

  if (!cfg.ghUser || !cfg.ghRepo || !cfg.ghToken) {
    mostrarEstadoSync('❌ Completá usuario de GitHub, repositorio y token antes de sincronizar.', 'error');
    return;
  }
  if (!cfg.sapUser || !cfg.sapPass) {
    mostrarEstadoSync('❌ Completá usuario y contraseña de SAP antes de sincronizar.', 'error');
    return;
  }

  mostrarEstadoSync('🔄 Sincronizando con GitHub...', 'info');

  const path = 'data/config.json';
  const apiUrl = `https://api.github.com/repos/${cfg.ghUser}/${cfg.ghRepo}/contents/${path}`;

  try {
    // 1) Intentar obtener el SHA del archivo actual (si existe) — la API de
    // GitHub lo exige para poder actualizar un archivo existente.
    let sha = null;
    const getResp = await fetch(apiUrl, {
      headers: {
        'Authorization': `Bearer ${cfg.ghToken}`,
        'Accept': 'application/vnd.github+json',
      },
    });
    if (getResp.ok) {
      const getData = await getResp.json();
      sha = getData.sha;
    } else if (getResp.status !== 404) {
      const errData = await getResp.json().catch(() => ({}));
      throw new Error(`No se pudo leer el archivo actual (HTTP ${getResp.status}): ${errData.message || ''}`);
    }

    // 2) Armar el contenido del config.json que va a leer el bot
    const contenido = {
      sap_user: cfg.sapUser,
      sap_pass: cfg.sapPass,
      rango_inicio: cfg.rangoInicio || '',
      rango_fin: cfg.rangoFin || '',
      actualizado: new Date().toISOString(),
    };

    const contenidoBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(contenido, null, 2))));

    // 3) Crear o actualizar el archivo vía la API de GitHub (Contents API)
    const putResp = await fetch(apiUrl, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${cfg.ghToken}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        message: `Actualizar configuración SAP - ${new Date().toLocaleString('es-AR')}`,
        content: contenidoBase64,
        sha: sha || undefined,
      }),
    });

    if (!putResp.ok) {
      const errData = await putResp.json().catch(() => ({}));
      throw new Error(`HTTP ${putResp.status}: ${errData.message || 'Error desconocido'}`);
    }

    mostrarEstadoSync('✅ Configuración sincronizada con éxito. El bot usará estos valores en su próxima ejecución.', 'ok');
    toast('Configuración sincronizada con GitHub');

  } catch (e) {
    mostrarEstadoSync(`❌ Error al sincronizar: ${e.message}. Verificá que el token tenga permiso "Contents: Read and write" sobre ese repositorio.`, 'error');
  }
}

// ══════════════════════════════════════════
// MATERIALES — Catálogo con detección automática de marca
// ══════════════════════════════════════════

// Detecta la marca según prefijos en el nombre/modelo, igual que en Base44.
function detectarMarcaPorPrefijo(nombreModelo) {
  const t = (nombreModelo || '').toUpperCase();
  if (t.includes('MOT'))  return 'Motorola';
  if (t.includes('SMG'))  return 'Samsung';
  if (t.includes('HUA'))  return 'Huawei';
  if (t.includes('HOR'))  return 'Honor';
  if (t.includes('TCL'))  return 'TCL';
  if (t.includes('APP'))  return 'Apple';
  if (t.includes('USIM')) return 'SIM Card';
  return '';
}

const MARCA_COLOR = {
  'Motorola':  '#2563EB',
  'Samsung':   '#1D4ED8',
  'Huawei':    '#DC2626',
  'Honor':     '#0891B2',
  'TCL':       '#7C3AED',
  'Apple':     '#374151',
  'SIM Card':  '#CA8A04',
};

function badgeMarca(marca) {
  if (!marca) return `<span class="badge badge-gris">Sin detectar</span>`;
  const color = MARCA_COLOR[marca] || '#1D4ED8';
  return `<span class="badge" style="background:${color}1A;color:${color};border:1px solid ${color}55">${marca}</span>`;
}

function renderMateriales() {
  const materiales = DB.get('materiales') || [];
  const conPrecio = materiales.filter(m => m.precio > 0).length;
  const conMarca = materiales.filter(m => m.marca).length;

  return `
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);max-width:640px">
      <div class="stat-card azul"><div class="label">Total Materiales</div><div class="valor">${materiales.length}</div></div>
      <div class="stat-card verde"><div class="label">Con Precio</div><div class="valor">${conPrecio}</div></div>
      <div class="stat-card naranja"><div class="label">Con Marca Detectada</div><div class="valor">${conMarca}</div></div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div class="search-bar">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="mat-search" placeholder="Buscar por código, nombre o marca..." oninput="filtrarMateriales()" style="padding:9px 9px 9px 34px;border:1.5px solid var(--gris-300);border-radius:6px;width:300px;font-size:13px;outline:none" />
      </div>
      <button class="btn btn-primary" onclick="abrirModalMaterial()">+ Nuevo Material</button>
    </div>

    <div class="tabla-wrapper" id="materiales-tabla">
      ${tablaMateriales(materiales)}
    </div>
  `;
}

function tablaMateriales(materiales) {
  if (!materiales.length) return `<div class="empty-state"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg><p>No hay materiales cargados todavía</p></div>`;
  return `
    <table>
      <thead><tr><th>Código</th><th>Nombre / Modelo</th><th>Marca</th><th style="text-align:right">Precio</th><th>Notas</th><th></th></tr></thead>
      <tbody>
        ${materiales.map(m => `
          <tr>
            <td style="font-family:monospace;font-weight:700;color:var(--azul)">${m.codigo}</td>
            <td>${m.nombre}</td>
            <td>${badgeMarca(m.marca)}</td>
            <td style="text-align:right">${m.precio ? '$' + Number(m.precio).toLocaleString('es-AR') : '—'}</td>
            <td style="font-size:11px;color:var(--gris-500);max-width:200px" class="truncate">${m.notas || '—'}</td>
            <td style="white-space:nowrap">
              <button class="btn btn-sm btn-secondary" onclick="abrirModalMaterial('${m.id}')">Editar</button>
              <button class="btn btn-sm btn-secondary" style="color:var(--rojo)" onclick="eliminarMaterial('${m.id}')">🗑️</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function filtrarMateriales() {
  const b = (document.getElementById('mat-search')?.value || '').toLowerCase();
  let materiales = DB.get('materiales') || [];
  if (b) materiales = materiales.filter(m =>
    m.codigo?.toLowerCase().includes(b) ||
    m.nombre?.toLowerCase().includes(b) ||
    m.marca?.toLowerCase().includes(b)
  );
  document.getElementById('materiales-tabla').innerHTML = tablaMateriales(materiales);
}

function abrirModalMaterial(id) {
  const materiales = DB.get('materiales') || [];

  const marcaActual = m?.marca || '';

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'modal-material';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <h3>${m ? 'Editar' : 'Nuevo'} Material</h3>
        <button class="btn btn-icon btn-secondary" onclick="cerrarModal('modal-material')">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div>
            <div class="form-group">
              <label>Código de Material *</label>
              <input type="text" id="mat-codigo" value="${m?.codigo || ''}" placeholder="Ej: 70013455" style="font-family:monospace" />
            </div>
          </div>
          <div>
            <div class="form-group">
              <label>Marca <span style="font-weight:400;color:var(--gris-500)">(automática)</span></label>
              <div id="mat-marca-preview" style="padding:10px 12px;border:1.5px solid var(--gris-300);border-radius:6px;background:var(--gris-100)">
                ${badgeMarca(marcaActual)}
              </div>
            </div>
          </div>
          <div class="full">
            <div class="form-group">
              <label>Nombre / Modelo *</label>
              <input type="text" id="mat-nombre" value="${m?.nombre || ''}" placeholder="Ej: MOT G15128GXT2521 NJ T" oninput="actualizarPreviewMarca()" />
              <p style="font-size:11px;color:var(--gris-500);margin-top:4px">La marca se detecta automáticamente según el prefijo: MOT, SMG, HUA, HOR, TCL, APP, USIM</p>
            </div>
          </div>
          <div>
            <div class="form-group">
              <label>Precio</label>
              <input type="number" id="mat-precio" value="${m?.precio || ''}" placeholder="0" />
            </div>
          </div>
          <div class="full">
            <div class="form-group">
              <label>Notas</label>
              <input type="text" id="mat-notas" value="${m?.notas || ''}" placeholder="Observaciones..." />
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="cerrarModal('modal-material')">Cancelar</button>
        <button class="btn btn-primary" onclick="guardarMaterial('${id || ''}')">Guardar</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function actualizarPreviewMarca() {
  const nombre = document.getElementById('mat-nombre').value;
  const marca = detectarMarcaPorPrefijo(nombre);
  document.getElementById('mat-marca-preview').innerHTML = badgeMarca(marca);
}

async function guardarMaterial(id) {
  const codigo = document.getElementById('mat-codigo').value.trim();
  const nombre = document.getElementById('mat-nombre').value.trim();
  if (!codigo || !nombre) { toast('Código y nombre son requeridos', 'error'); return; }

  const marca = detectarMarcaPorPrefijo(nombre);
  const datos = {
    codigo, nombre, marca,
    precio: parseFloat(document.getElementById('mat-precio').value) || 0,
    notas: document.getElementById('mat-notas').value.trim(),
  };

  const materiales = await dbGet('materiales');
  if (id) {
    await SB.update('materiales', id, datos, SB_TOKEN);
  } else {
    const existente = materiales.find(m => m.codigo === codigo);
    if (existente) {
      await SB.update('materiales', existente.id, datos, SB_TOKEN);
    } else {
      await SB.insert('materiales', { id: DB.genId(), ...datos }, SB_TOKEN);
    }
  }
  dbInvalidate('materiales');
  toast('Material guardado');
  cerrarModal('modal-material');
  navegar('materiales');
}

async function eliminarMaterial(id) {
  await SB.delete('materiales', id, SB_TOKEN);
  dbInvalidate('materiales');
  toast('Material eliminado');
  navegar('materiales');
}

// Busca un material por código y devuelve {nombre, marca, precio} o null
function buscarMaterialPorCodigo(codigo) {
  if (!codigo) return null;
  const materiales = DB.get('materiales') || [];
  return materiales.find(m => m.codigo === codigo.trim()) || null;
}

// ══════════════════════════════════════════
// REALTIME — Supabase Realtime via WebSocket
// ══════════════════════════════════════════

let realtimeWS = null;

function iniciarRealtime() {
  if (!SB_TOKEN) return;
  if (realtimeWS) realtimeWS.close();

  const wsUrl = `wss://iebfyjbkmjuicrrbezbi.supabase.co/realtime/v1/websocket?apikey=${SUPABASE_KEY}&vsn=1.0.0`;
  realtimeWS = new WebSocket(wsUrl);

  const indicador = document.getElementById('realtime-indicator');

  realtimeWS.onopen = () => {
    if (indicador) indicador.style.display = 'flex';
    // Autenticar
    realtimeWS.send(JSON.stringify({
      topic: 'realtime:*',
      event: 'phx_join',
      payload: { user_token: SB_TOKEN },
      ref: '1',
    }));
    // Suscribirse a cambios en las tablas principales
    ['dispositivos','remitos','cuentas_corrientes','materiales','puntos_venta','legajos'].forEach((tabla, i) => {
      realtimeWS.send(JSON.stringify({
        topic: `realtime:public:${tabla}`,
        event: 'phx_join',
        payload: { config: { broadcast: { self: false }, presence: { key: '' } } },
        ref: String(i + 2),
      }));
    });
  };

  realtimeWS.onmessage = (evt) => {
    try {
      const msg = JSON.parse(evt.data);
      if (['INSERT','UPDATE','DELETE','postgres_changes'].includes(msg.event)) {
        const tabla = msg.topic?.replace('realtime:public:', '');
        if (tabla && TABLA_MAP[tabla]) {
          dbInvalidate(tabla);
          dbGet(tabla).then(() => {
            const paginasAfectadas = {
              dispositivos: ['stock','comodatos'],
              remitos: ['remitos'],
              cuentas_corrientes: ['cuentas'],
              materiales: ['materiales'],
              puntos_venta: ['puntos-venta'],
              legajos: ['legajos'],
            };
            const paginaActual = document.getElementById('page-title')?.textContent;
            const afecta = paginasAfectadas[tabla] || [];
            if (afecta.some(p => PAGINAS[p]?.titulo === paginaActual)) {
              toast(`📡 Datos actualizados (${tabla})`);
              const paginaKey = Object.keys(PAGINAS).find(k => PAGINAS[k].titulo === paginaActual);
              if (paginaKey) setTimeout(() => navegar(paginaKey), 300);
            }
          });
        }
      }
    } catch(e) { /* ignorar mensajes no JSON */ }
  };

  realtimeWS.onerror = () => {
    if (indicador) indicador.style.display = 'none';
  };

  realtimeWS.onclose = () => {
    if (indicador) indicador.style.display = 'none';
    if (SB_TOKEN) setTimeout(iniciarRealtime, 5000);
  };
}

function detenerRealtime() {
  if (realtimeWS) {
    realtimeWS.onclose = null; // evitar reconexión automática al cerrar sesión
    realtimeWS.close();
    realtimeWS = null;
  }
}
